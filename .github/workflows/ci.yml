name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  release-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate release units
        run: ./scripts/validate-release-units.sh

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with ruff
        run: |
          cd backend
          ruff check .
      - name: Test with pytest
        run: |
          cd backend
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      - name: Type check
        run: |
          cd frontend
          npm run build # Vite build runs tsc

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  docker-build-terminal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build terminal image
        run: docker build -t roguelike-terminal:test .

  docker-build-brain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build brain image
        run: docker build -t roguelike-brain:test -f agentic-brain/Dockerfile agentic-brain
