version: '3.8'

services:
  brain:
    build: 
      context: ./agentic-brain
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./agentic-brain/app:/app
    environment:
      - LLM_URL=${LLM_URL:-http://host.docker.internal:8080/v1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/state"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

  terminal:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
    depends_on:
      - brain
